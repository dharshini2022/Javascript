<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href = "styles.css"/>
    <title>Image Gallery LightBox</title>
</head>
<body>
    <h1> Image Gallery LightBox</h1>
    <section>
        <div class="Gallery">
            <img src = "https://wallpapers.com/images/hd/summer-season-pictures-tv0qu6ckd2ib1ef1.jpg" alt="img"/>
            <p class ="caption">Summer Season</p>
        </div>
        <div class="Gallery">
            <img src = "https://tse3.mm.bing.net/th/id/OIP.z8El4tRpajmF83m27FCzMQHaEK?rs=1&pid=ImgDetMain&o=7&rm=3" alt="img"/>
            <p class ="caption">Autumn Season</p>
        </div>
        <div class="Gallery">
            <img src = "https://th.bing.com/th/id/R.f59b90781e5248d6c5b522f1d3b6df21?rik=o%2fOgb%2bVn87x0Yg&riu=http%3a%2f%2fgetwallpapers.com%2fwallpaper%2ffull%2fa%2fb%2f9%2f1163645-cool-spring-season-pictures-wallpapers-1920x1200.jpg&ehk=N9KtRvHaKb3MeK%2bI20RG%2fehozPXyy%2bxhvC2wRSRLtMg%3d&risl=&pid=ImgRaw&r=0" alt="img"/>
            <p class ="caption">Spring Season</p>
        </div>
        <div class="Gallery">
            <img src = "https://tse2.mm.bing.net/th/id/OIP.-n9hoTQ-JEPMU5qQlIkiYwHaD4?rs=1&pid=ImgDetMain&o=7&rm=3" alt="img"/>
            <p class ="caption">Winter Season</p>
        </div>
    </section>
    
    <div class="overlay">
        <div class="popup">
            <button id="closeBtn">&times;</button>
            <div class="selectedDiv"></div>
        </div>
    </div>

    <script src = "script.js"></script>
</body>
</html>
